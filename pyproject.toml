[tool.pytest.ini_options]
testpaths    = ["tests"]
python_files = ["[0-9][0-9][0-9]_test_*.py"]
asyncio_mode = "auto"
addopts      = "-v --tb=short"

[tool.ruff]
target-version = "py312"
line-length    = 100
src            = ["app", "tests"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "C4", "RUF"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["app"]