[tool.pytest.ini_options]
testpaths    = ["tests"]
python_files = ["[0-9][0-9][0-9]_test_*.py"]
asyncio_mode = "auto"
addopts      = "-v --tb=short"

[tool.black]
line-length = 128
target-version = ["py312"]

[tool.ruff]
target-version = "py312"
line-length = 128

[tool.ruff.lint]
# E — pycodestyle errors, F — pyflakes, W — warnings, I — isort
select = ["E", "F", "W", "I"]
# E501 — line too long (covered by line-length above)
ignore = ["E501"]
