name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - run: pip install ".[dev]"

      - run: ruff check . && black --check . --target-version py312 && mypy pyfragment

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"] # 3.13, 3.14 are not supported by some dependencies yet

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up conda (Miniconda)
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: ${{ matrix.python-version }}
          activate-environment: pyfragment-test
          auto-activate-base: false

      - name: Install package and dev dependencies
        shell: bash -el {0}
        run: pip install ".[dev]"

      - name: Run tests
        shell: bash -el {0}
        run: pytest
